<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks | Marshal Academy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== BODY ===== */
body {
    margin: 0;
    transition: 0.3s;
}

/* ===== SIDEBAR ===== */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 60px;
    height: 100vh;
    background-color: #0a192f;
    padding: 10px;
    transition: width 0.3s;
    overflow: hidden;
    z-index: 1001;
    display: flex;
    flex-direction: column;
}

.sidebar.expanded {
    width: 250px;
}

/* Fixed toggle button size */
.toggle-btn {
    background: none;
    color: white;
    border: 1px solid white;
    padding: 5px;
    cursor: pointer;
    margin-bottom: 20px;
    width: 40px; 
    height: 40px;
}

.sidebar a {
    display: flex;
    align-items: center;
    color: #ccc;
    text-decoration: none;
    padding: 15px 0;
}

.sidebar i {
    width: 40px;
    text-align: center;
    font-style: normal;
}

.label {
    display: none;
    margin-left: 10px;
}

.sidebar.expanded .label {
    display: inline;
    color: white;
}

a:hover {
    color: white;
}

/* ===== NAVBAR (Updated to your requested style) ===== */
.navbar {
    position: fixed;
    top: 0;
    left: 60px;           /* Starts after the mini sidebar */
    right: 0;
    height: 60px;
    background-color: #112240;
    color: white;
    display: flex;
    align-items: center;
    justify-content: flex-start; 
    padding: 0 20px;
    transition: left 0.3s;
    z-index: 1000;
}

body.sidebar-expanded .navbar {
    left: 250px; /* Moves when sidebar expands */
}

.nav-left {
    display: flex;
    align-items: center;
}

.nav-logo {
    height: 40px;
    margin-left: 0px;
}

.navrightside {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 15px;
}

.navrightside a {
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
}

.nav-pic {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgb(48, 48, 48);
    cursor: pointer;
}

/* ===== TASK AREA ===== */
#alltask {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    margin-top: 100px;
    margin-left: 80px; 
    transition: 0.3s;
    justify-content: center;
}

body.sidebar-expanded #alltask {
    margin-left: 270px;
}

.task-card {
    background: #161858;
    border-radius: 10px;
    width: 280px;
    padding: 20px;
    color: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.btn-activity {
    background: #df9432;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 14px;
    font-weight: bold;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
}

/* ===== FOOTER ===== */
.footer {
    position: fixed;
    left: 60px;
    right: 0;
    bottom: 0;
    background: #19191a;
    color: white;
    text-align: center;
    padding: 10px 0;
    transition: 0.3s;
}

body.sidebar-expanded .footer {
    left: 250px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

    <a href="page2.html"><i>🏠</i><span class="label">Dashboard</span></a>
    <a href="page3.html"><i>📚</i><span class="label">Notebook</span></a>
    <a href="page4.html"><i>📅</i><span class="label">Tasks</span></a>
    <a href="page5.html"><i>👦</i><span class="label">Profile</span></a>
    <a href="index.html"><i>⬅️</i><span class="label">Logout</span></a>
</div>

<!-- NAVBAR (Your specific style) -->
<div class="navbar">
    <div class="nav-left">
        <img src="https://www.image2url.com/r2/default/images/1777270232853-7c3e97ca-e8a1-4a12-ac48-a8891111d17a.png" 
             alt="Logo" class="nav-logo" style="border-radius:100px;">
    </div>
    
    <div class="navrightside">
        <a href="#">Logout</a>
        <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" 
             alt="Profile" class="nav-pic">
    </div>
</div>

<!-- TITLE -->
<h1 style="color:#ffffff; font-weight:bold; font-size:60px; text-align:center; margin-top:100px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">
TASKS
</h1>

<!-- TASKS CONTAINER -->
<div id="alltask">
    <div class="task-card">

        <p style="font-size: 12px;">Deadline: April 9 2026</p>
        <button class="btn-activity">Take activity</button>
    </div>

    <div class="task-card">
        <h3>Science</h3>
        <p style="color:#daa814; font-weight:bold;">Laboratory Act 3</p>
        <p style="font-size: 12px;">Deadline: April 13 2026</p>
        <button class="btn-activity">Take activity</button>
    </div>

    <div class="task-card">
        <h3>ICT</h3>
        <p style="color:#daa814; font-weight:bold;">Quarter Project</p>
        <p style="font-size: 12px;">Deadline: May 4 2026</p>
        <button class="btn-activity">Take activity</button>
    </div>

    <div class="task-card">
        <h3>VE</h3>
        <p style="color:#daa814; font-weight:bold;">Film Critique</p>
        <p style="font-size: 12px;">Deadline: April 22 2026</p>
        <button class="btn-activity">Take activity</button>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    Marshal Academy | Est. 1667
</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("expanded");
    document.body.classList.toggle("sidebar-expanded");
}
</script>

</body>
</html>
