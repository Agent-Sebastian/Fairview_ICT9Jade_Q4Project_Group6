<style>

/* ===== BODY ===== */
body{
    margin: 0;
    background-color: #f4f4f4;
}

/* ===== SIDEBAR ===== */
.sidebar{
    position: fixed;
    top: 0;
    left: 0;
    width: 60px;
    height: 100vh;
    background: #0a192f;
    padding: 10px;
    overflow: hidden;
    transition: 0.3s;
    z-index: 1001;
}

.sidebar.expanded{
    width: 250px;
}

.sidebar button{
    background: none;
    color: white;
    border: 1px solid white;
    padding: 5px;
    cursor: pointer;
    margin-bottom: 20px;
    width: 100%;
}

.sidebar a{
    display: flex;
    align-items: center;
    color: #ccc;
    text-decoration: none;
    padding: 15px 0;
}

.sidebar i{
    width: 40px;
    text-align: center;
}

.label{
    display: none;
}

.sidebar.expanded .label{
    display: inline;
    color: white;
}

/* ===== NAVBAR ===== */
.navbar{
    position: fixed;
    top: 0;
    left: 60px;
    right: 0;
    height: 60px;
    background: #112240;
    display: flex;
    align-items: center;
    padding: 0 20px;
    transition: 0.3s;
    z-index: 1000;
}

body.sidebar-expanded .navbar{
    left: 250px;
}

.nav-right{
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 15px;
}

.nav-right img{
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid white;
}

/* ===== TASK AREA ===== */
#alltask{
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    padding: 20px;
    padding-left: 95px;
    margin: 150px auto;
    justify-content: center;
}

body.sidebar-expanded #alltask{
    padding-left: 270px;
}

/* ===== FOOTER ===== */
.footer{
    position: fixed;
    left: 60px;
    right: 0;
    bottom: 0;
    background: #19191a;
    color: white;
    text-align: center;
    padding: 10px 0;
    transition: 0.3s;
}

body.sidebar-expanded .footer{
    left: 250px;
}

</style>
</head>
